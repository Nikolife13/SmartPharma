# Подключение к MySQL
# Пароль по умолчанию — только для локальной разработки. В продакшене задавайте
# через переменную окружения DB_PASSWORD, не редактируя этот файл.
spring.datasource.url=jdbc:mysql://localhost:3306/smartpharma?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server
server.port=8080

# JWT
jwt.secret=${JWT_SECRET:this-is-a-very-long-secret-key-for-smartpharma-project-do-not-use-in-production}
jwt.expiration=900000
